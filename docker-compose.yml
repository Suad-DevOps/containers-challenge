version: "3"
services:
  web:
    build: ./app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
  nginx:
    image: nginx
    ports:
      - "5000:80"
    volumes:
      - ./app/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
  redis:
    image: redis
    volumes:
      - redis-data:/data
volumes:
  redis-data:
